name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    # Blocking check: root advisory tsc is now enforced so Stage 4a/5 PRs
    # cannot merge unless both the migration ratchet and repo-wide typecheck
    # stay green. This mirrors the strict Definition of Done in the sprint
    # plan and PR template.
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check

  type-check-strict:
    name: TypeScript Strict Type Check
    runs-on: ubuntu-latest
    # Blocking check that grows with the noImplicitAny migration.
    # Only files/dirs listed in tsconfig.strict.json are enforced;
    # everything else stays under the root repo-wide type-check job above.
    # See docs/TypeScriptStrictMigration.md for the staged plan.
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run strict type check
        run: npm run type-check:strict

  unit-tests:
    name: Unit & Component Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  browser-e2e:
    name: Browser E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build demo for E2E
        run: npm run build:demo
        env:
          VITE_BASE: /

      - name: Run E2E tests
        run: npm run test:browser
