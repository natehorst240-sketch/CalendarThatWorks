name: CI

# Pull request runs cover every feature branch with an open PR. Push
# is scoped to main so we still get a post-merge regression guard plus
# a deploy-artifact build, without doubling CI minutes on every push
# that's already going to fire pull_request right after.
on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    # Root tsconfig now has `strict: true` + `strictNullChecks: true`, so
    # `tsc --noEmit` enforces strict typing repo-wide. The per-path
    # strict-null ratchet used during migration has been retired.
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check

  unit-tests:
    name: Unit & Component Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  browser-e2e:
    name: Browser E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build demo for E2E
        run: npm run build:demo
        env:
          VITE_BASE: /

      - name: Run E2E tests
        run: npm run test:browser
